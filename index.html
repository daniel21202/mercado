<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cesta Já</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
/* ---------- tokens ---------- */
:root {
  --paper: #EFE9DE;
  --ink: #211F1B;
  --awning: #1F4D3A;
  --awning-dark: #153726;
  --mustard: #D9A441;
  --tomato: #C1432E;
  --card: #FAF7EF;
  --line: #D8CFBE;
  --amber-bg: #F7E3C4;
  --amber-ink: #5A3A06;
  --amber-ink-strong: #8A5A0A;
  --green-bg: #DCEBE2;

  /* largura do "cartão" do app — ajustada por breakpoint mais abaixo */
  --app-max-width: 28rem;
  --grid-cols: 2;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  background: #DCD5C4;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  -webkit-text-size-adjust: 100%;
}

.mono { font-family: 'IBM Plex Mono', monospace; }
.serif { font-family: 'Fraunces', serif; }

.shell {
  width: 100%;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.app {
  width: 100%;
  max-width: var(--app-max-width);
  min-height: 100vh;
  background: var(--paper);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,.35);
  display: flex;
  flex-direction: column;
}

/* ---------- breakpoints ---------- */
/* celular pequeno */
@media (max-width: 380px) {
  :root { --grid-cols: 2; }
  .home-title { font-size: 30px; }
  .ticket-code { font-size: 30px; letter-spacing: 2px; }
}

/* tablet (retrato/paisagem) */
@media (min-width: 640px) {
  :root {
    --app-max-width: 40rem;
    --grid-cols: 3;
  }
  .shell { padding: 32px 16px; align-items: center; }
  .app { min-height: 90vh; border-radius: 20px; overflow: hidden; }
  .form-wrap, .payment-body { max-width: 460px; }
}

/* desktop */
@media (min-width: 1024px) {
  :root {
    --app-max-width: 64rem;
    --grid-cols: 4;
  }
  .shell { padding: 48px 24px; }
  .app { min-height: 85vh; }
  .topbar { padding: 16px 28px; }
  .catalog-body, .basket-body, .tab-pane { padding-left: 32px; padding-right: 32px; }
  .form-wrap, .payment-body { max-width: 520px; }
  .product-card { padding: 16px; }
}

/* telas bem grandes */
@media (min-width: 1440px) {
  :root { --app-max-width: 78rem; }
}

.screen {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--paper);
  flex: 1;
}

/* ---------- topbar ---------- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--awning);
  color: var(--paper);
}
.topbar-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.topbar-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.icon-btn { background: none; border: none; padding: 4px; border-radius: 6px; color: inherit; cursor: pointer; display: flex; }
.icon-btn:hover { background: rgba(255,255,255,.1); }

/* ---------- generic buttons ---------- */
.btn {
  border: none;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .1s;
}
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .45; cursor: default; }
.btn-block { width: 100%; }
.btn-lg { padding: 14px; }
.btn-md { padding: 10px 16px; }
.btn-sm { padding: 6px 10px; font-size: 14px; }
.btn-primary { background: var(--awning); color: var(--paper); }
.btn-outline { background: transparent; border: 2px solid var(--awning); color: var(--awning); }
.btn-danger { background: var(--tomato); color: #fff; }
.btn-mustard { background: var(--mustard); color: var(--awning-dark); }
.btn-ghost-border { background: transparent; border: 1px solid var(--line); color: var(--ink); border-radius: 10px; }

/* ---------- home ---------- */
.home {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px;
  text-align: center;
  gap: 40px;
}
.home-emoji { font-size: 60px; margin-bottom: 12px; }
.home-title { font-family: 'Fraunces', serif; font-weight: 900; color: var(--awning); font-size: 36px; margin: 0 0 8px; }
.home-sub { opacity: .7; max-width: 260px; margin: 0 auto; }
.home-actions { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 300px; }

/* ---------- forms ---------- */
.form-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 24px; gap: 20px; max-width: 380px; margin: 0 auto; width: 100%; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; opacity: .6; }
.field-label-light { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--mustard); }
input[type=text], input[type=password], input[type=tel], input[type=number], input:not([type]), select {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--card);
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  width: 100%;
}
input:focus, select:focus { box-shadow: 0 0 0 2px var(--awning); }
.hint { font-size: 13px; opacity: .7; }
.error-text { font-size: 14px; color: #F5B6A9; }

/* ---------- market login ---------- */
.market-login-screen { background: var(--awning); }
.market-login-screen input { background: #fff; }
.market-login-header { text-align: center; margin-bottom: 8px; }
.market-login-header h2 { font-family: 'Fraunces', serif; font-weight: 700; color: var(--paper); font-size: 20px; margin: 8px 0 0; }
.demo-hint { font-size: 12px; text-align: center; opacity: .7; color: var(--paper); }

/* ---------- catalog ---------- */
.catalog-body { flex: 1; overflow-y: auto; padding: 16px 16px 112px; }
.empty-msg { text-align: center; opacity: .6; margin-top: 40px; }
.category-block { margin-bottom: 24px; }
.category-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--mustard); margin: 0 0 8px 4px; }
.product-grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 12px; }
.product-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.product-name { font-size: 14px; font-weight: 500; line-height: 1.2; }
.product-price { font-size: 14px; font-weight: 700; color: var(--awning); }
.thumb { display: flex; align-items: center; justify-content: center; border-radius: 10px; background: var(--paper); overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.qty-stepper { margin-top: 4px; display: flex; align-items: center; justify-content: space-between; border-radius: 10px; overflow: hidden; background: var(--awning); }
.qty-stepper button { background: none; border: none; color: #fff; padding: 6px 12px; cursor: pointer; display: flex; }
.qty-stepper span { color: #fff; font-weight: 700; font-size: 14px; }
.add-btn { margin-top: 4px; padding: 6px 0; border-radius: 10px; font-size: 14px; font-weight: 600; background: var(--awning); color: var(--paper); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }

.floating-bar {
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  max-width: calc(var(--app-max-width) - 32px);
  margin: 0 auto;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--tomato);
  color: #fff;
  border: none;
  cursor: pointer;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,.3);
}
.floating-bar .left { display: flex; align-items: center; gap: 8px; font-weight: 600; }
.floating-bar .right { font-weight: 700; }

/* ---------- basket review ---------- */
.basket-body { flex: 1; overflow-y: auto; padding: 16px; }
.basket-row { display: flex; align-items: center; gap: 12px; border-radius: 10px; padding: 12px; border: 1px solid var(--line); background: var(--card); margin-bottom: 8px; }
.basket-row .info { flex: 1; min-width: 0; }
.basket-row .info .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.basket-row .info .price { font-size: 12px; opacity: .6; }
.basket-row .controls { display: flex; align-items: center; gap: 8px; }
.step-btn { padding: 6px; border-radius: 8px; background: var(--paper); border: none; cursor: pointer; display: flex; }
.step-qty { font-weight: 700; font-size: 14px; width: 16px; text-align: center; }
.trash-btn { padding: 6px; border-radius: 8px; background: none; border: none; color: #c0392b; cursor: pointer; display: flex; }
.basket-footer { padding: 16px; border-top: 1px solid var(--line); background: var(--card); }
.basket-footer .total-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
.total-label { font-weight: 600; }
.total-value { font-weight: 700; font-size: 18px; color: var(--awning); }

/* ---------- payment ---------- */
.payment-body { flex: 1; padding: 24px 16px; max-width: 380px; margin: 0 auto; width: 100%; }
.pay-total-box { display: flex; justify-content: space-between; margin-bottom: 24px; border-radius: 10px; padding: 16px; background: var(--card); border: 1px solid var(--line); }
.section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; opacity: .6; margin-bottom: 8px; }
.method-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; border: 2px solid var(--line); background: var(--card); width: 100%; text-align: left; cursor: pointer; margin-bottom: 8px; }
.method-row.active { border-color: var(--awning); }
.method-row .emoji { font-size: 20px; }
.method-row .label { flex: 1; font-weight: 500; }
.pix-note { margin-bottom: 24px; border-radius: 10px; padding: 12px; display: flex; align-items: flex-start; gap: 8px; background: var(--amber-bg); color: var(--amber-ink); font-size: 14px; }
.disclaimer { font-size: 12px; text-align: center; opacity: .5; margin-top: 12px; }

/* ---------- receipt ---------- */
.receipt-wrap { flex: 1; padding: 32px 16px; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
.receipt-note { text-align: center; font-size: 14px; opacity: .7; max-width: 260px; margin: 0 auto; }
.ticket-outer { position: relative; margin: 0 auto; max-width: 260px; width: 100%; }
.ticket { border-radius: 10px; padding: 24px; background: var(--card); border: 2px dashed var(--line); position: relative; }
.ticket-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.ticket-head-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; opacity: .6; }
.ticket-brand { font-family: 'Fraunces', serif; font-weight: 700; color: var(--awning); font-size: 18px; }
.stamp { display: inline-block; padding: 4px 16px; border: 4px solid var(--tomato); border-radius: 6px; color: var(--tomato); font-family: 'Fraunces', serif; font-weight: 900; letter-spacing: 2px; transform: rotate(-8deg); font-size: 22px; user-select: none; }
.ticket-code-wrap { text-align: center; margin: 20px 0; }
.ticket-code-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; opacity: .6; margin-bottom: 4px; }
.ticket-code { font-family: 'IBM Plex Mono', monospace; letter-spacing: 4px; font-size: 36px; font-weight: 700; }
.barcode { display: flex; justify-content: center; gap: 3px; margin: 16px 0; height: 40px; align-items: stretch; }
.barcode div { background: var(--ink); opacity: .8; }
.ticket-items { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
.ticket-item-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
.ticket-item-row .name { opacity: .8; }
.ticket-total-row { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px; display: flex; justify-content: space-between; font-weight: 700; }
.ticket-total-row .value { color: var(--awning); }
.ticket-customer { font-size: 12px; text-align: center; opacity: .6; margin-top: 16px; }
.ticket-notch { position: absolute; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: space-around; }
.ticket-notch.left { left: -8px; }
.ticket-notch.right { right: -8px; }
.ticket-notch div { width: 16px; height: 16px; border-radius: 50%; background: var(--paper); }

/* ---------- market dashboard ---------- */
.tabs-bar { display: flex; overflow-x: auto; border-bottom: 1px solid var(--line); background: var(--card); flex-shrink: 0; }
.tab-btn {
  flex: 1; min-width: 84px; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 8px; border: none; background: none; border-bottom: 2px solid transparent;
  cursor: pointer; color: var(--ink); opacity: .55; font-family: 'Inter', sans-serif;
}
.tab-btn.active { border-color: var(--awning); color: var(--awning); opacity: 1; }
.tab-btn span { font-size: 11px; font-weight: 600; }
.tab-content { flex: 1; overflow-y: auto; }
.tab-pane { padding: 20px 16px; display: flex; flex-direction: column; gap: 24px; }

/* retirada */
.search-row { display: flex; gap: 8px; }
.search-row input { flex: 1; text-transform: uppercase; }
.search-btn { padding: 0 16px; border-radius: 10px; background: var(--awning); color: var(--paper); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.order-card { border-radius: 14px; padding: 16px; background: var(--card); border: 1px solid var(--line); }
.order-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.order-code { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; }
.order-customer { font-size: 14px; opacity: .7; }
.pill { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
.pill-green { background: var(--green-bg); color: var(--awning); }
.pill-amber { background: var(--amber-bg); color: var(--amber-ink-strong); }
.order-items { border-top: 1px solid var(--line); padding-top: 12px; }
.order-item-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
.order-total-row { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px; display: flex; justify-content: space-between; font-weight: 700; }
.order-total-row .value { color: var(--awning); }
.recent-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); width: 100%; text-align: left; cursor: pointer; margin-bottom: 8px; }
.recent-row .left { display: flex; align-items: center; gap: 8px; }
.recent-row .name-dim { opacity: .6; font-size: 14px; }

/* produtos */
.prod-form { border-radius: 14px; padding: 16px; background: var(--card); border: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
.prod-form-top { display: flex; align-items: center; gap: 12px; }
.photo-picker { width: 64px; height: 64px; border-radius: 10px; flex-shrink: 0; cursor: pointer; overflow: hidden; }
.photo-picker img { width: 100%; height: 100%; object-fit: cover; }
.photo-placeholder { width: 64px; height: 64px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: var(--paper); border: 1px dashed var(--line); }
.photo-placeholder span { font-size: 9px; opacity: .5; }
.prod-form-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.prod-form-fields .row { display: flex; gap: 8px; }
.prod-form-fields input.price-input { width: 96px; }
.prod-form-actions { display: flex; gap: 8px; }
.product-row { display: flex; align-items: center; gap: 12px; border-radius: 10px; padding: 10px; border: 1px solid var(--line); background: var(--card); margin-bottom: 8px; }
.product-row .info { flex: 1; min-width: 0; }
.product-row .info .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.product-row .info .meta { font-size: 12px; opacity: .6; }
.icon-square { padding: 8px; border-radius: 8px; background: var(--paper); border: none; cursor: pointer; display: flex; }
.icon-square.danger { color: #c0392b; }

/* relatorios */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card { border-radius: 14px; padding: 16px; background: var(--card); border: 1px solid var(--line); }
.stat-card .stat-label { font-size: 12px; opacity: .6; margin-bottom: 4px; }
.stat-card .stat-value { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 18px; }
.highlight-card { border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line); }
.highlight-icon { padding: 10px; border-radius: 50%; display: flex; }
.highlight-icon.amber { background: var(--amber-bg); }
.highlight-icon.green { background: var(--green-bg); }
.highlight-title { font-size: 12px; opacity: .6; margin-bottom: 2px; }
.highlight-value { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-row { display: flex; align-items: center; gap: 12px; border-radius: 10px; padding: 10px; border: 1px solid var(--line); background: var(--card); margin-bottom: 8px; }
.rank-num { font-family: 'IBM Plex Mono', monospace; font-weight: 700; opacity: .5; width: 20px; }
.rank-name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-qty { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--awning); }
select#month-select, select { text-transform: capitalize; font-weight: 500; }

/* pix */
.pix-form { border-radius: 14px; padding: 16px; background: var(--card); border: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
.pix-form-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; opacity: .6; display: flex; align-items: center; gap: 6px; }
.month-box { border-radius: 14px; padding: 16px; background: var(--card); border: 1px solid var(--line); }
.month-box .amount { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 24px; color: var(--awning); }
.history-row { border-radius: 10px; padding: 12px; background: var(--card); border: 1px solid var(--line); margin-bottom: 8px; }
.history-row .top { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; text-transform: capitalize; }
.history-row .top .value { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--awning); }
.bar-track { height: 8px; border-radius: 999px; overflow: hidden; background: var(--paper); }
.bar-fill { height: 100%; border-radius: 999px; background: var(--mustard); }

/* ---------- loader ---------- */
.full-loader { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: var(--paper); min-height: 60vh; }
.full-loader p { font-size: 14px; opacity: .6; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.opacity-60 { opacity: .6; }
.hidden { display: none !important; }

</style>
</head>

function productFromRow(row) {

async function saveOrder(order) {

    if (error) throw error;
    return true;
  } catch (e) {
    console.error("Erro ao salvar pedido", e);
    return false;
  }
}
async function fetchOrder(code) {
  try {
    const { data, error } = await sb.from("orders").select("*").eq("code", code).maybeSingle();
    if (error) throw error;
    return data ? orderFromRow(data) : null;
  } catch (e) {

}
async function listAllOrders() {

      category: product.category,

  await Promise.all(SEED_PRODUCTS.map((p) => saveProduct(p)));

/* ================= IMAGEM ================= */
function fileToResizedDataURL(file, maxDim = 360, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) {
          if (width > maxDim) {
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          }
        } else if (height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function catalogTotals() {
  const itemCount = Object.values(state.basket).reduce((a, b) => a + b, 0);
  const total = Object.entries(state.basket).reduce((sum, [id, q]) => {
    const p = state.products.find((p) => p.id === id);
    return sum + (p ? q * p.price : 0);
  }, 0);
  return { itemCount, total };
}

        <p class="section-label">Validar comprovante</p>
        <div class="search-row">
          <input id="input-retirada-code" type="text" placeholder="Ex: M4821" value="${escapeHtml(state.retiradaCode)}" />
          <button class="search-btn" id="btn-search-order">${state.retiradaLoading ? icon("loader-2", 18, "spin") : icon("search", 18)}</button>
        </div>
        ${state.retiradaNotFound ? `<p class="error-text" style="color:var(--tomato);margin-top:8px">Nenhum pedido encontrado com esse código.</p>` : ""}
      </div>
      ${orderCard}
      <div>
        <p class="section-label">Pedidos recentes</p>
        ${recentHtml}
      </div>
    </div>`;
}

/* ---------- TAB: PRODUTOS ---------- */
function renderTabProdutos() {
  const products = state.products;
  const categories = [...new Set(products.map((p) => p.category || "Outros"))];
  const editing = state.productEditingId;
  const editingProduct = editing ? products.find((p) => p.id === editing) : null;

  const photoDraft = state.productPhotoDraft !== null ? state.productPhotoDraft : (editingProduct ? editingProduct.photo : null);

  const photoBlock = photoDraft
    ? `<img src="${photoDraft}" alt="preview" />`
    : `<div class="photo-placeholder">${icon("camera", 18, "opacity-60")}<span>foto</span></div>`;

  const rows = products
    .map(
      (p) => `
      <div class="product-row">
        ${thumbOrEmoji(p, 40)}
        <div class="info">
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="meta">${escapeHtml(p.category || "Outros")} · <span class="mono">${brl(p.price)}</span></div>
        </div>
        <button class="icon-square" data-action="edit-product" data-id="${p.id}">${icon("pencil", 14)}</button>
        <button class="icon-square danger" data-action="remove-product" data-id="${p.id}">${icon("trash-2", 14)}</button>
      </div>`
    )
    .join("");

  const datalistOptions = categories.map((c) => `<option value="${escapeHtml(c)}"></option>`).join("");

  return `
    <div class="tab-pane">
      <div class="prod-form">
        <p class="section-label">${editing ? "Editar produto" : "Novo produto"}</p>
        <div class="prod-form-top">
          <label class="photo-picker">
            <input type="file" accept="image/*" id="input-product-photo" class="hidden" />
            ${photoBlock}
          </label>
          <div class="prod-form-fields">
            <input type="text" id="input-product-name" placeholder="Nome do produto" value="${escapeHtml(editingProduct ? editingProduct.name : "")}" />
            <div class="row">
              <input type="number" step="0.01" min="0" id="input-product-price" class="price-input" placeholder="Preço" value="${editingProduct ? editingProduct.price : ""}" />
              <input type="text" id="input-product-category" placeholder="Categoria" list="cats" value="${escapeHtml(editingProduct ? editingProduct.category || "" : "")}" />
              <datalist id="cats">${datalistOptions}</datalist>
            </div>
          </div>
        </div>
        <div class="prod-form-actions">
          <button class="btn btn-primary" style="flex:1" id="btn-save-product" ${state.pixSaving ? "disabled" : ""}>
            ${editing ? icon("pencil", 16) : icon("plus", 16)} ${editing ? "Salvar alterações" : "Adicionar produto"}
          </button>
          ${editing ? `<button class="btn btn-ghost-border" id="btn-cancel-edit">${icon("x", 16)}</button>` : ""}
        </div>
      </div>
      <div>
        <p class="section-label">Catálogo (${products.length})</p>
        ${rows}
      </div>
    </div>`;
}

/* ---------- TAB: RELATÓRIOS ---------- */
function renderTabRelatorios() {
  const allOrders = state.allOrders;
  const months = [...new Set(allOrders.map((o) => monthKey(o.createdAt)))].sort().reverse();
  if (!state.reportMonth && months.length) state.reportMonth = months[0];
  const month = state.reportMonth;

  if (months.length === 0) {
    return `<div class="tab-pane"><p class="empty-msg">Ainda não há vendas registradas.</p></div>`;
  }

  const filtered = allOrders.filter((o) => monthKey(o.createdAt) === month);

  const qtyByProduct = {};
  filtered.forEach((o) => o.items.forEach((it) => (qtyByProduct[it.name] = (qtyByProduct[it.name] || 0) + it.qty)));
  const topProduct = Object.entries(qtyByProduct).sort((a, b) => b[1] - a[1])[0];

  const spentByCustomer = {};
  const ordersByCustomer = {};
  filtered.forEach((o) => {
    spentByCustomer[o.customerName] = (spentByCustomer[o.customerName] || 0) + o.total;
    ordersByCustomer[o.customerName] = (ordersByCustomer[o.customerName] || 0) + 1;
  });
  const topCustomer = Object.entries(spentByCustomer).sort((a, b) => b[1] - a[1])[0];

  const totalRevenue = filtered.reduce((s, o) => s + o.total, 0);
  const productRanking = Object.entries(qtyByProduct).sort((a, b) => b[1] - a[1]).slice(0, 5);

  const monthOptions = months.map((m) => `<option value="${m}" ${m === month ? "selected" : ""}>${monthLabel(m)}</option>`).join("");

  const rankingHtml = productRanking.length
    ? `<div>
        <p class="section-label">Ranking de produtos</p>
        ${productRanking
          .map(
            ([name, q], i) => `
          <div class="rank-row">
            <span class="rank-num mono">${i + 1}</span>
            <span class="rank-name">${escapeHtml(name)}</span>
            <span class="rank-qty mono">${q} un.</span>
          </div>`
          )
          .join("")}
      </div>`
    : "";

  return `
    <div class="tab-pane">
      <select id="month-select">${monthOptions}</select>
      <div class="stat-grid">
        <div class="stat-card">
          ${icon("trending-up", 18, "opacity-60")}
          <div class="stat-label" style="margin-top:8px">Arrecadado no mês</div>
          <div class="stat-value mono" style="color:var(--awning)">${brl(totalRevenue)}</div>
        </div>
        <div class="stat-card">
          ${icon("shopping-basket", 18, "opacity-60")}
          <div class="stat-label" style="margin-top:8px">Pedidos no mês</div>
          <div class="stat-value mono">${filtered.length}</div>
        </div>
      </div>
      <div class="highlight-card">
        <div class="highlight-icon amber">${icon("trophy", 20)}</div>
        <div class="min-w-0">
          <div class="highlight-title">Produto mais vendido</div>
          <div class="highlight-value">${topProduct ? `${escapeHtml(topProduct[0])} · ${topProduct[1]} un.` : "—"}</div>
        </div>
      </div>
      <div class="highlight-card">
        <div class="highlight-icon green">${icon("users", 20)}</div>
        <div class="min-w-0">
          <div class="highlight-title">Cliente que mais comprou</div>
          <div class="highlight-value">${topCustomer ? `${escapeHtml(topCustomer[0])} · ${brl(topCustomer[1])} (${ordersByCustomer[topCustomer[0]]} pedidos)` : "—"}</div>
        </div>
      </div>
      ${rankingHtml}
    </div>`;
}

/* ---------- TAB: PIX ---------- */
function renderTabPix() {
  const allOrders = state.allOrders;
  const form = state.pixConfig || { keyType: "email", key: "", ownerName: "" };

  const revenueByMonth = {};
  allOrders.forEach((o) => {
    const m = monthKey(o.createdAt);
    revenueByMonth[m] = (revenueByMonth[m] || 0) + o.total;
  });
  const months = Object.keys(revenueByMonth).sort().reverse();
  const thisMonth = new Date().toISOString().slice(0, 7);
  const thisMonthTotal = revenueByMonth[thisMonth] || 0;
  const maxMonth = Math.max(1, ...Object.values(revenueByMonth));

  const historyHtml = months.length === 0
    ? `<p class="hint" style="opacity:.5">Nenhuma venda registrada ainda.</p>`
    : months
        .map(
          (m) => `
      <div class="history-row">
        <div class="top">
          <span>${monthLabel(m)}</span>
          <span class="value">${brl(revenueByMonth[m])}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${(revenueByMonth[m] / maxMonth) * 100}%"></div></div>
      </div>`
        )
        .join("");

  const keyTypes = ["cpf", "cnpj", "email", "telefone", "aleatoria"];
  const keyLabels = { cpf: "CPF", cnpj: "CNPJ", email: "E-mail", telefone: "Telefone", aleatoria: "Chave aleatória" };

  return `
    <div class="tab-pane">
      <div class="pix-form">
        <p class="pix-form-title">${icon("wallet", 14)} Chave Pix para receber pagamentos</p>
        <select id="input-pix-type">
          ${keyTypes.map((t) => `<option value="${t}" ${form.keyType === t ? "selected" : ""}>${keyLabels[t]}</option>`).join("")}
        </select>
        <input type="text" id="input-pix-key" class="mono" placeholder="Digite a chave Pix" value="${escapeHtml(form.key || "")}" />
        <input type="text" id="input-pix-owner" placeholder="Nome do mercado (aparece pro cliente)" value="${escapeHtml(form.ownerName || "")}" />
        <button class="btn btn-primary" id="btn-save-pix" ${state.pixSaving ? "disabled" : ""}>
          ${state.pixSaving ? icon("loader-2", 16, "spin") : icon("check", 16)}
          ${state.pixSaved ? "Salvo!" : "Salvar chave Pix"}
        </button>
      </div>
      <div class="month-box">
        <div class="stat-label">Arrecadado este mês (${monthLabel(thisMonth)})</div>
        <div class="amount">${brl(thisMonthTotal)}</div>
      </div>
      <div>
        <p class="section-label">Histórico de arrecadação</p>
        ${historyHtml}
      </div>
    </div>`;
}

/* ================= AÇÕES DE CESTA (compartilhadas) ================= */
function basketChange(id, delta) {
  const next = { ...state.basket };
  const v = (next[id] || 0) + delta;
  if (v <= 0) delete next[id];
  else next[id] = v;
  state.basket = next;
  render();
}

/* ================= EVENTOS ================= */
function bindEvents() {
  // navegação genérica
  app.querySelectorAll("[data-action='goto']").forEach((el) =>
    el.addEventListener("click", () => goto(el.dataset.view))
  );
  const backBtn = app.querySelector("[data-action='back']");
  if (backBtn) backBtn.addEventListener("click", handleBack);
  const logoutBtn = app.querySelector("[data-action='logout']");
  if (logoutBtn) logoutBtn.addEventListener("click", () => {
    state.marketAuth = false;
    goto("home");
  });

  // cesta
  app.querySelectorAll("[data-action='basket-inc']").forEach((el) =>
    el.addEventListener("click", () => basketChange(el.dataset.id, 1))
  );
  app.querySelectorAll("[data-action='basket-dec']").forEach((el) =>
    el.addEventListener("click", () => basketChange(el.dataset.id, -1))
  );
  app.querySelectorAll("[data-action='basket-remove']").forEach((el) =>
    el.addEventListener("click", () => {
      const qty = state.basket[el.dataset.id] || 0;
      basketChange(el.dataset.id, -qty);
    })
  );

  switch (state.view) {
    case "customer-access": bindCustomerAccess(); break;
    case "basket": bindBasketReview(); break;
    case "payment": bindPayment(); break;
    case "receipt": bindReceipt(); break;
    case "market-login": bindMarketLogin(); break;
    case "market-dashboard":
      if (state.marketAuth) bindMarketDashboard();
      else bindMarketLogin();
      break;
  }
}

function handleBack() {
  const map = {
    "customer-access": "home",
    catalog: "home",
    basket: "catalog",
    payment: "basket",
    "market-login": "home",
  };
  goto(map[state.view] || "home");
}

function bindCustomerAccess() {
  const nameInput = document.getElementById("input-name");
  const btn = document.getElementById("btn-enter-catalog");
  const sync = () => (btn.disabled = !nameInput.value.trim());
  nameInput.addEventListener("input", sync);
  sync();
  btn.addEventListener("click", () => {
    state.customerName = nameInput.value.trim();
    goto("catalog");
  });
}

function bindBasketReview() {
  const btn = document.getElementById("btn-go-payment");
  if (btn) btn.addEventListener("click", () => goto("payment"));
}

function bindPayment() {
  app.querySelectorAll("[data-action='set-method']").forEach((el) =>
    el.addEventListener("click", () => {
      state.paymentMethod = el.dataset.method;
      render();
    })
  );
  const payBtn = document.getElementById("btn-pay");
  if (payBtn) payBtn.addEventListener("click", pay);
}

async function pay() {
  state.paymentLoading = true;
  render();

  const items = basketItems();
  const total = items.reduce((s, i) => s + i.qty * i.price, 0);
  const order = {
    code: genCode(),
    customerName: state.customerName,
    items: items.map((i) => ({ name: i.name, price: i.price, qty: i.qty, emoji: i.emoji, photo: i.photo || null })),
    total,
    method: state.paymentMethod,
    status: "pago",
    createdAt: new Date().toISOString(),
    pickedUpAt: null,
  };
  let existing = await fetchOrder(order.code);
  while (existing) {
    order.code = genCode();
    existing = await fetchOrder(order.code);
  }
  await new Promise((r) => setTimeout(r, 1100));
  const ok = await saveOrder(order);
  state.paymentLoading = false;
  if (ok) {
    state.order = order;
    goto("receipt");
  } else {
    render();
  }
}

function bindReceipt() {
  const btn = document.getElementById("btn-conclude");
  if (btn)
    btn.addEventListener("click", () => {
      resetCustomer();
      goto("home");
    });
}

function bindMarketLogin() {
  const submit = () => {
    const user = document.getElementById("input-user").value;
    const pass = document.getElementById("input-pass").value;
    if (user.trim() === "mercado" && pass === "1234") {
      state.loginError = "";
      state.marketAuth = true;
      state.view = "market-dashboard";
      loadMarketData();
    } else {
      state.loginError = "Usuário ou senha incorretos.";
      render();
    }
  };
  document.getElementById("btn-market-login").addEventListener("click", submit);
  ["input-user", "input-pass"].forEach((id) => {
    document.getElementById(id).addEventListener("keydown", (e) => {
      if (e.key === "Enter") submit();
    });
  });
}

async function loadMarketData() {
  state.loadingOrders = true;
  state.loadingProducts = true;
  render();
  const [orders, products] = await Promise.all([listAllOrders(), listAllProducts()]);
  state.allOrders = orders;
  state.products = products;
  state.loadingOrders = false;
  state.loadingProducts = false;
  const pixConfig = await getPixConfig();
  state.pixConfig = pixConfig;
  render();
}

function bindMarketDashboard() {
  app.querySelectorAll("[data-action='set-tab']").forEach((el) =>
    el.addEventListener("click", () => {
      state.marketTab = el.dataset.tab;
      render();
    })
  );
  if (state.marketTab === "retirada") bindTabRetirada();
  if (state.marketTab === "produtos") bindTabProdutos();
  if (state.marketTab === "relatorios") bindTabRelatorios();
  if (state.marketTab === "pix") bindTabPix();
}

function bindTabRetirada() {
  const input = document.getElementById("input-retirada-code");
  const searchBtn = document.getElementById("btn-search-order");
  const doSearch = async (codeArg) => {
    const value = (codeArg ?? input.value).trim().toUpperCase();
    if (!value) return;
    state.retiradaLoading = true;
    state.retiradaNotFound = false;
    render();
    const found = await fetchOrder(value);
    state.retiradaLoading = false;
    if (found) {
      state.retiradaOrder = found;
      state.retiradaCode = value;
    } else {
      state.retiradaOrder = null;
      state.retiradaNotFound = true;
    }
    render();
  };
  if (input) {
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch();
    });
  }
  if (searchBtn) searchBtn.addEventListener("click", () => doSearch());

  app.querySelectorAll("[data-action='search-order']").forEach((el) =>
    el.addEventListener("click", () => doSearch(el.dataset.code))
  );

  const pickupBtn = document.getElementById("btn-confirm-pickup");
  if (pickupBtn)
    pickupBtn.addEventListener("click", async () => {
      const updated = { ...state.retiradaOrder, status: "retirado", pickedUpAt: new Date().toISOString() };
      const ok = await saveOrder(updated);
      if (ok) {
        state.retiradaOrder = updated;
        state.allOrders = await listAllOrders();
        render();
      }
    });
}

function bindTabProdutos() {
  const photoInput = document.getElementById("input-product-photo");
  if (photoInput) {
    photoInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const dataUrl = await fileToResizedDataURL(file);
        state.productPhotoDraft = dataUrl;
        render();
      } catch (err) {
        console.error(err);
      }
    });
  }

  app.querySelectorAll("[data-action='edit-product']").forEach((el) =>
    el.addEventListener("click", () => {
      state.productEditingId = el.dataset.id;
      state.productPhotoDraft = null;
      render();
    })
  );

  const cancelBtn = document.getElementById("btn-cancel-edit");
  if (cancelBtn)
    cancelBtn.addEventListener("click", () => {
      state.productEditingId = null;
      state.productPhotoDraft = null;
      render();
    });

  const saveBtn = document.getElementById("btn-save-product");
  if (saveBtn)
    saveBtn.addEventListener("click", async () => {
      const name = document.getElementById("input-product-name").value;
      const price = document.getElementById("input-product-price").value;
      const category = document.getElementById("input-product-category").value;
      if (!name.trim() || !price) return;

      const id = state.productEditingId || "c_" + Date.now();
      const existing = state.products.find((p) => p.id === id);
      const product = {
        id,
        name: name.trim(),
        price: parseFloat(price),
        category: category.trim() || "Outros",
        photo: state.productPhotoDraft || (existing ? existing.photo : null),
        emoji: existing ? existing.emoji : null,
        updatedAt: new Date().toISOString(),
      };
      await saveProduct(product);
      state.productEditingId = null;
      state.productPhotoDraft = null;
      state.products = await listAllProducts();
      render();
    });

  app.querySelectorAll("[data-action='remove-product']").forEach((el) =>
    el.addEventListener("click", async () => {
      await deleteProductStorage(el.dataset.id);
      if (state.productEditingId === el.dataset.id) {
        state.productEditingId = null;
        state.productPhotoDraft = null;
      }
      state.products = await listAllProducts();
      render();
    })
  );
}

function bindTabRelatorios() {
  const select = document.getElementById("month-select");
  if (select)
    select.addEventListener("change", (e) => {
      state.reportMonth = e.target.value;
      render();
    });
}

function bindTabPix() {
  const saveBtn = document.getElementById("btn-save-pix");
  if (saveBtn)
    saveBtn.addEventListener("click", async () => {
      const keyType = document.getElementById("input-pix-type").value;
      const key = document.getElementById("input-pix-key").value;
      const ownerName = document.getElementById("input-pix-owner").value;
      if (!key.trim()) return;
      state.pixSaving = true;
      render();
      const cfg = { keyType, key, ownerName };
      const ok = await savePixConfig(cfg);
      state.pixSaving = false;
      if (ok) {
        state.pixConfig = cfg;
        state.pixSaved = true;
        render();
        setTimeout(() => {
          state.pixSaved = false;
          render();
        }, 2200);
      } else {
        render();
      }
    });
}

/* ================= INIT ================= */
async function init() {
  await ensureSeeded();
  state.products = await listAllProducts();
  state.loadingProducts = false;
  state.appReady = true;
  render();
}

init();

  </script>
